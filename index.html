<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZMANIA CONTENT HUB - v9.8 Cloud Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            color: #f1f5f9;
            padding-bottom: 20px;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            transition: all 0.3s ease;
        }

        .brand-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
        }

        .brand-hub {
            color: #fbce03;
            text-shadow: 0 0 15px rgba(251, 206, 3, 0.4);
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        @media (min-width: 768px) {
            .calendar-grid { gap: 12px; }
        }

        .calendar-day {
            aspect-ratio: 1/1;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .calendar-day { border-radius: 22px; }
        }

        .calendar-day:hover {
            transform: scale(1.05);
            z-index: 10;
            border-color: white;
        }

        /* Penanda Warna Berdasarkan Status */
        .has-wait {
            background: rgba(251, 191, 36, 0.25) !important;
            border: 1px solid rgba(251, 191, 36, 0.5) !important;
        }
        .has-proses {
            background: rgba(96, 165, 250, 0.25) !important;
            border: 1px solid rgba(96, 165, 250, 0.5) !important;
        }
        .has-selesai {
            background: rgba(52, 211, 153, 0.25) !important;
            border: 1px solid rgba(52, 211, 153, 0.5) !important;
        }
        .has-publish {
            background: rgba(192, 132, 252, 0.25) !important;
            border: 1px solid rgba(192, 132, 252, 0.5) !important;
        }

        .today-glow {
            outline: 2px solid #fbce03 !important;
            outline-offset: 2px;
            box-shadow: 0 0 20px rgba(251, 206, 3, 0.3);
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .wait { background: #fbbf24; }
        .proses { background: #60a5fa; }
        .selesai { background: #34d399; }
        .publish { background: #c084fc; }

        .btn-primary {
            background: var(--accent-gradient);
            color: #ffffff;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
        }

        .calendar-footer-marquee {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            margin-top: 20px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            overflow: hidden;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee-slow 40s linear infinite;
        }

        @keyframes marquee-slow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @media (max-width: 640px) {
            .calendar-grid { gap: 4px; }
            .calendar-day { border-radius: 10px; }
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-10 gap-6">
            <div class="flex items-center gap-4 md:gap-5">
                <div class="p-3 md:p-4 bg-slate-800 rounded-2xl border border-white/10 shadow-xl">
                    <i class="fa-solid fa-layer-group text-indigo-400 text-xl md:text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-3xl font-black brand-text uppercase tracking-tight leading-none">
                        AZMANIA CONTENT <span class="brand-hub">HUB</span>
                    </h1>
                    <p class="text-indigo-300 text-[8px] md:text-[10px] font-bold tracking-[0.4em] mt-1 uppercase opacity-90">IT & Production Pipeline</p>
                </div>
            </div>

            <div class="glass-panel w-full md:w-auto px-4 md:px-6 py-3 md:py-4 flex flex-row items-center justify-between md:justify-start gap-4 md:gap-8 border-indigo-500/20">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-left md:text-right">
                        <div id="clock-time" class="text-lg md:text-2xl font-black text-white tracking-widest font-mono">00:00:00</div>
                        <div id="clock-date" class="text-[8px] md:text-[10px] font-bold text-slate-300 uppercase tracking-widest">LOADING...</div>
                    </div>
                    <div id="server-dot" class="hidden md:block w-2.5 h-2.5 rounded-full bg-slate-500 shadow-[0_0_10px_#64748b]"></div>
                </div>
                <div class="h-8 md:h-10 w-px bg-white/10"></div>
                <button onclick="openFormModal()" class="btn-primary px-4 md:px-7 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-[9px] md:text-[10px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-transform">
                    <i class="fa-solid fa-plus-circle text-sm"></i> <span class="hidden sm:inline">BUAT</span> PROYEK
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <aside class="lg:col-span-3 space-y-6 md:space-y-8 order-2 lg:order-1">
                <div class="glass-panel p-6 md:p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-3">Aktif Pipeline</p>
                    <div class="flex items-baseline gap-4">
                        <span id="active-count" class="text-5xl md:text-6xl font-black text-white tracking-tighter">0</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Konten</span>
                    </div>
                    <div class="mt-6">
                        <div class="flex justify-between items-center text-[9px] font-black text-slate-200 mb-2 uppercase">
                            <span>Efisiensi</span>
                            <span id="avg-text" class="text-indigo-400">0%</span>
                        </div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-white/5">
                            <div id="avg-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-5 border-l-4 border-l-red-500">
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                        <i class="fa-solid fa-fire text-red-500"></i> Hari Ini
                    </h3>
                    <div id="today-tasks" class="space-y-3 max-h-[180px] overflow-y-auto custom-scroll pr-1"></div>
                </div>

                <div class="glass-panel p-5 border-l-4 border-l-indigo-500">
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                        <i class="fa-solid fa-calendar-check text-indigo-500"></i> Mendatang
                    </h3>
                    <div id="upcoming-tasks" class="space-y-3 max-h-[220px] overflow-y-auto custom-scroll pr-1"></div>
                </div>
            </aside>

            <main class="lg:col-span-9 space-y-6 md:space-y-8 order-1 lg:order-2">
                <div class="glass-panel p-4 md:p-8 flex flex-col">
                    <div class="flex items-center justify-between mb-6 md:mb-10">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-slate-800 hover:bg-slate-700 text-white transition-all border border-white/10 flex items-center justify-center"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                        <div class="text-center">
                            <h2 id="month-year" class="text-lg md:text-2xl font-black text-white tracking-tight uppercase"></h2>
                            <p class="text-[8px] md:text-[10px] text-indigo-400 font-black uppercase tracking-[0.3em] mt-1">MASTER SCHEDULE</p>
                        </div>
                        <button onclick="changeMonth(1)" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-slate-800 hover:bg-slate-700 text-white transition-all border border-white/10 flex items-center justify-center"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                    </div>

                    <div class="flex flex-wrap gap-4 mb-6 justify-center">
                        <div class="flex items-center gap-2"><div class="status-dot wait"></div><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Wait</span></div>
                        <div class="flex items-center gap-2"><div class="status-dot proses"></div><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Proses</span></div>
                        <div class="flex items-center gap-2"><div class="status-dot selesai"></div><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Done</span></div>
                        <div class="flex items-center gap-2"><div class="status-dot publish"></div><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Publish</span></div>
                    </div>

                    <div class="calendar-grid">
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Min</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Sen</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Sel</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Rab</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Kam</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Jum</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Sab</div>
                        <div id="calendar-days" class="contents"></div>
                    </div>

                    <div class="calendar-footer-marquee">
                        <div class="marquee-content" id="marquee-list"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-lg p-8 border-indigo-500/30">
            <h3 class="text-2xl font-black mb-1 text-white uppercase tracking-tighter">Entri Pipeline</h3>
            <p class="text-slate-400 text-[10px] mb-8 font-bold uppercase tracking-widest">Detail Metadata Produksi</p>
            <form id="projectForm" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Nama Proyek</label>
                    <input type="text" id="p-title" required class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Deadline</label>
                        <input type="date" id="p-date" required class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Kategori</label>
                        <select id="p-cat" class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                            <option value="Video">Video</option>
                            <option value="Desain">Desain</option>
                            <option value="Sosmed">Sosmed</option>
                            <option value="IT Hub">IT Hub</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('formModal')" class="flex-grow py-4 bg-slate-800 text-slate-300 rounded-xl font-black text-[10px] uppercase tracking-widest">Batal</button>
                    <button type="submit" id="btn-save" class="flex-grow py-4 btn-primary text-white rounded-xl font-black text-[10px] uppercase tracking-widest">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden border-indigo-500/20">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900">
                <h3 id="detail-date-title" class="text-xl md:text-2xl font-black text-white uppercase tracking-tighter"></h3>
                <button onclick="closeModal('detailModal')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-red-500 transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex flex-col md:flex-row h-full overflow-hidden">
                <div class="flex-grow p-6 overflow-y-auto custom-scroll border-b md:border-b-0 md:border-r border-white/10">
                    <p class="text-[9px] font-black text-indigo-300 uppercase tracking-widest mb-4">Daftar Agenda</p>
                    <div id="detail-list" class="space-y-4"></div>
                </div>
                <div class="w-full md:w-80 p-6 bg-slate-900/50">
                    <p class="text-[9px] font-black text-indigo-300 uppercase tracking-widest mb-4">Input Proyek Baru</p>
                    <form id="quickAddForm" class="space-y-4">
                        <input type="hidden" id="quick-date">
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Nama Proyek</label>
                            <input type="text" id="q-title" required class="w-full px-4 py-2 bg-slate-800 border border-white/5 rounded-lg text-xs text-white font-bold outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Kategori</label>
                            <select id="q-cat" class="w-full px-4 py-2 bg-slate-800 border border-white/5 rounded-lg text-xs text-white font-bold outline-none focus:border-indigo-500">
                                <option value="Video">Video</option>
                                <option value="Desain">Desain</option>
                                <option value="Sosmed">Sosmed</option>
                                <option value="IT Hub">IT Hub</option>
                            </select>
                        </div>
                        <button type="submit" id="btn-quick" class="w-full py-3 btn-primary text-white rounded-lg font-black text-[9px] uppercase tracking-widest mt-2 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-plus text-xs"></i> Tambah Proyek
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
    // 1. URL GOOGLE APPS SCRIPT ANDA
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzW10m2jnwQBLTD56ASdv19luj1pOx692R7Q4LOCrdMQk1zvOHReatkTW8xTVTW_0YE/exec';
    
    let projects = [];
    let currentViewDate = new Date();
    const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
    const quotes = ["LILLAHI TA'ALA", "CTRL + S ADALAH KUNCI", "AMANAH VISUAL", "REVISI ADALAH JALAN", "HARGAI WAKTU", "SPIRIT AZMANIA"];

    // FUNGSI INIT (DIPERBAIKI UNTUK CLOUD)
    async function init() {
        updateClock();
        renderMarquee();
        
        try {
            // Ambil data dari Google Sheets
            const response = await fetch(scriptURL);
            const dataCloud = await response.json();
            
            // Mapping agar formatnya sama persis dengan projectForm Anda
            projects = dataCloud.map((item, index) => ({
                id: index,
                title: item.nama,
                date: item.deadline, // Pastikan di Sheets formatnya YYYY-MM-DD
                cat: item.kategori,
                status: (item.status || 'wait').toLowerCase()
            }));

            // Jalankan fungsi render asli Anda
            renderStats();
            renderCalendar();
            renderSidebars();
            
            console.log("Data Cloud Berhasil Dimuat");
        } catch (error) {
            console.error("Gagal ambil data:", error);
            // Backup ke localStorage jika cloud gagal (opsional)
            const localData = localStorage.getItem('azmania_v97_db');
            if (localData) {
                projects = JSON.parse(localData);
                renderStats();
                renderCalendar();
                renderSidebars();
            }
        }
    }

    // FUNGSI SIMPAN (DIPERBAIKI UNTUK CLOUD)
    document.getElementById('projectForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerText;
        btn.innerText = "SINKRON...";
        btn.disabled = true;

        const newProject = {
            nama: document.getElementById('p-title').value,
            deadline: document.getElementById('p-date').value,
            kategori: document.getElementById('p-cat').value
        };

        try {
            // 1. Kirim ke Google Sheets
            await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(newProject)
            });

            // 2. Simpan juga di local sebagai cadangan cepat
            projects.push({
                id: Date.now(),
                title: newProject.nama,
                date: newProject.deadline,
                cat: newProject.kategori,
                status: 'wait'
            });
            localStorage.setItem('azmania_v97_db', JSON.stringify(projects));

            // 3. Reset UI
            closeModal('formModal');
            e.target.reset();
            
            // 4. Refresh total dari Cloud
            await init(); 
        } catch (err) {
            alert("Gagal sinkron ke Cloud, tapi data tersimpan di browser ini.");
            console.error(err);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };

    // Fungsi Update Clock, Marquee, RenderStats, RenderCalendar, RenderSidebars, dll
    // GUNAKAN KODE ASLI ANDA DI BAWAH INI TANPA PERUBAHAN
    // ... (copy sisa fungsi dari file index.html asli Anda di sini) ...

    window.onload = init;
  </script>
</body>
</html>
