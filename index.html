<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZMANIA CONTENT HUB - v9.5 Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            color: #f1f5f9;
            padding-bottom: 20px;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            transition: all 0.3s ease;
        }

        .brand-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
        }

        .brand-hub {
            color: #fbce03;
            text-shadow: 0 0 15px rgba(251, 206, 3, 0.4);
        }

        /* Responsive Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        @media (min-width: 768px) {
            .calendar-grid { gap: 12px; }
        }

        .calendar-day {
            min-height: 80px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 16px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        @media (min-width: 768px) {
            .calendar-day { min-height: 110px; padding: 12px; border-radius: 20px; }
        }

        .calendar-day:hover {
            transform: translateY(-3px);
            background: rgba(30, 41, 59, 0.8);
            border-color: #818cf8;
        }

        /* Highlighting Real Today */
        .today-glow {
            background: rgba(99, 102, 241, 0.15) !important;
            border: 2px solid #6366f1 !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .project-tag {
            font-size: 7px;
            font-weight: 800;
            padding: 2px 4px;
            border-radius: 4px;
            margin-bottom: 2px;
            display: block;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (min-width: 768px) {
            .project-tag { font-size: 8px; padding: 4px 6px; border-radius: 8px; margin-bottom: 4px; }
        }

        .wait { background: #78350f; color: #fbbf24; border: 1px solid #d97706; }
        .proses { background: #1e3a8a; color: #60a5fa; border: 1px solid #2563eb; }
        .selesai { background: #064e3b; color: #34d399; border: 1px solid #059669; }
        .publish { background: #4c1d95; color: #c084fc; border: 1px solid #7c3aed; }

        .btn-primary {
            background: var(--accent-gradient);
            color: #ffffff;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
        }

        /* In-Calendar Marquee */
        .calendar-footer-marquee {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            margin-top: 20px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            overflow: hidden;
            position: relative;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee-slow 40s linear infinite;
        }

        @keyframes marquee-slow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Mobile specific fixes */
        @media (max-width: 640px) {
            .header-info { text-align: center; }
            .calendar-grid { gap: 4px; }
            .calendar-day { border-radius: 10px; min-height: 60px; }
            .day-label { font-size: 9px !important; }
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-10 gap-6">
            <div class="flex items-center gap-4 md:gap-5">
                <div class="p-3 md:p-4 bg-slate-800 rounded-2xl border border-white/10 shadow-xl">
                    <i class="fa-solid fa-layer-group text-indigo-400 text-xl md:text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-3xl font-black brand-text uppercase tracking-tight leading-none">
                        AZMANIA CONTENT <span class="brand-hub">HUB</span>
                    </h1>
                    <p class="text-indigo-300 text-[8px] md:text-[10px] font-bold tracking-[0.4em] mt-1 uppercase opacity-90">IT & Production Pipeline</p>
                </div>
            </div>

            <div class="glass-panel w-full md:w-auto px-4 md:px-6 py-3 md:py-4 flex flex-row items-center justify-between md:justify-start gap-4 md:gap-8 border-indigo-500/20">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-left md:text-right">
                        <div id="clock-time" class="text-lg md:text-2xl font-black text-white tracking-widest font-mono">00:00:00</div>
                        <div id="clock-date" class="text-[8px] md:text-[10px] font-bold text-slate-300 uppercase tracking-widest">LOADING...</div>
                    </div>
                    <div class="hidden md:block w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981] animate-pulse"></div>
                </div>
                <div class="h-8 md:h-10 w-px bg-white/10"></div>
                <button onclick="openFormModal()" class="btn-primary px-4 md:px-7 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-[9px] md:text-[10px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-transform">
                    <i class="fa-solid fa-plus-circle text-sm"></i> <span class="hidden sm:inline">BUAT</span> PROYEK
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <!-- Sidebar -->
            <aside class="lg:col-span-3 space-y-6 md:space-y-8 order-2 lg:order-1">
                <!-- Status Card -->
                <div class="glass-panel p-6 md:p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-3">Aktif Pipeline</p>
                    <div class="flex items-baseline gap-4">
                        <span id="active-count" class="text-5xl md:text-6xl font-black text-white tracking-tighter">0</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Konten</span>
                    </div>
                    <div class="mt-6">
                        <div class="flex justify-between items-center text-[9px] font-black text-slate-200 mb-2 uppercase">
                            <span>Efisiensi</span>
                            <span id="avg-text" class="text-indigo-400">0%</span>
                        </div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-white/5">
                            <div id="avg-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Agenda Hari Ini -->
                <div class="glass-panel p-5 border-l-4 border-l-red-500">
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                        <i class="fa-solid fa-fire text-red-500"></i> Hari Ini
                    </h3>
                    <div id="today-tasks" class="space-y-3 max-h-[180px] overflow-y-auto custom-scroll pr-1"></div>
                </div>

                <!-- Agenda Mendatang (PENGINGAT TERDEKAT) -->
                <div class="glass-panel p-5 border-l-4 border-l-indigo-500">
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                        <i class="fa-solid fa-calendar-check text-indigo-500"></i> Mendatang
                    </h3>
                    <div id="upcoming-tasks" class="space-y-3 max-h-[220px] overflow-y-auto custom-scroll pr-1"></div>
                </div>
            </aside>

            <!-- Main Area -->
            <main class="lg:col-span-9 space-y-6 md:space-y-8 order-1 lg:order-2">
                <div class="glass-panel p-4 md:p-8 flex flex-col">
                    <!-- Navigasi Bulan -->
                    <div class="flex items-center justify-between mb-6 md:mb-10">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-slate-800 hover:bg-slate-700 text-white transition-all border border-white/10 flex items-center justify-center"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                        <div class="text-center">
                            <h2 id="month-year" class="text-lg md:text-2xl font-black text-white tracking-tight uppercase"></h2>
                            <p class="text-[8px] md:text-[10px] text-indigo-400 font-black uppercase tracking-[0.3em] mt-1">MASTER SCHEDULE</p>
                        </div>
                        <button onclick="changeMonth(1)" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-slate-800 hover:bg-slate-700 text-white transition-all border border-white/10 flex items-center justify-center"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                    </div>

                    <!-- Kalender Grid -->
                    <div class="calendar-grid">
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Min</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Sen</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Sel</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Rab</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Kam</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Jum</div>
                        <div class="text-center py-2 text-[9px] md:text-[11px] font-black text-slate-500 uppercase tracking-widest day-label">Sab</div>
                        <div id="calendar-days" class="contents"></div>
                    </div>

                    <!-- In-Box Marquee -->
                    <div class="calendar-footer-marquee">
                        <div class="marquee-content" id="marquee-list"></div>
                    </div>
                </div>

                <!-- Legend -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                    <div class="glass-panel p-3 flex items-center justify-center gap-3 border-amber-500/20">
                        <div class="w-2.5 h-2.5 rounded-full bg-amber-400 shadow-[0_0_8px_#fbbf24]"></div>
                        <span class="text-[9px] font-black text-amber-400 uppercase tracking-widest">Antrean</span>
                    </div>
                    <div class="glass-panel p-3 flex items-center justify-center gap-3 border-blue-500/20">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-400 shadow-[0_0_8px_#60a5fa]"></div>
                        <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Proses</span>
                    </div>
                    <div class="glass-panel p-3 flex items-center justify-center gap-3 border-emerald-500/20">
                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]"></div>
                        <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Selesai</span>
                    </div>
                    <div class="glass-panel p-3 flex items-center justify-center gap-3 border-purple-500/20">
                        <div class="w-2.5 h-2.5 rounded-full bg-purple-400 shadow-[0_0_8px_#c084fc]"></div>
                        <span class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Tayang</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="formModal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-lg p-8 md:p-10 border-indigo-500/30">
            <h3 class="text-2xl md:text-3xl font-black mb-1 text-white uppercase tracking-tighter">Entri Pipeline</h3>
            <p class="text-slate-400 text-[10px] mb-8 font-bold uppercase tracking-widest">Detail Metadata Produksi</p>
            <form id="projectForm" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Nama Proyek</label>
                    <input type="text" id="p-title" required class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Deadline</label>
                        <input type="date" id="p-date" required class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Kategori</label>
                        <select id="p-cat" class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                            <option value="Video">Video</option>
                            <option value="Desain">Desain</option>
                            <option value="Sosmed">Sosmed</option>
                            <option value="IT Hub">IT Hub</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('formModal')" class="flex-grow py-4 bg-slate-800 text-slate-300 rounded-xl font-black text-[10px] uppercase tracking-widest">Batal</button>
                    <button type="submit" class="flex-grow py-4 btn-primary text-white rounded-xl font-black text-[10px] uppercase tracking-widest">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden border-indigo-500/20">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900">
                <h3 id="detail-date" class="text-xl md:text-2xl font-black text-white uppercase tracking-tighter"></h3>
                <button onclick="closeModal('detailModal')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-red-500 transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="detail-list" class="p-6 space-y-4 overflow-y-auto custom-scroll"></div>
        </div>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('azmania_v95_db')) || [];
        let currentViewDate = new Date();
        const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];

        const quotes = [
            "LILLAHI TA'ALA: NIATKAN KERJA SEBAGAI IBADAH.",
            "CTRL + S ADALAH KUNCI KETENANGAN BATIN.",
            "AMANAH VISUAL: SETIAP FRAME ADALAH SAKSI.",
            "REVISI ADALAH JALAN MENUJU KESEMPURNAAN.",
            "HARGAI WAKTU, REZEKI AKAN MENGIKUTI.",
            "SPIRIT AZMANIA: KOMPAK, KREATIF, BERKAH."
        ];

        function init() {
            updateClock();
            renderMarquee();
            renderStats();
            renderCalendar();
            renderSidebars();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('clock-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        }
        setInterval(updateClock, 1000);

        function renderMarquee() {
            const container = document.getElementById('marquee-list');
            const content = [...quotes, ...quotes, ...quotes].map(q => `
                <span class="mx-12 inline-flex items-center gap-3 font-black text-[9px] tracking-widest text-slate-300 uppercase">
                    <i class="fa-solid fa-star text-amber-400 text-[6px]"></i> ${q}
                </span>
            `).join('');
            container.innerHTML = content;
        }

        function renderStats() {
            const active = projects.filter(p => p.status !== 'publish');
            document.getElementById('active-count').innerText = active.length;
            if (projects.length === 0) return;
            const weights = { 'wait': 10, 'proses': 50, 'selesai': 90, 'publish': 100 };
            const avg = Math.round(projects.reduce((acc, p) => acc + (weights[p.status] || 0), 0) / projects.length);
            document.getElementById('avg-bar').style.width = avg + '%';
            document.getElementById('avg-text').innerText = avg + '%';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            grid.innerHTML = '';
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('month-year').innerText = `${months[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const realToday = new Date();
            const realDateStr = `${realToday.getFullYear()}-${(realToday.getMonth() + 1).toString().padStart(2, '0')}-${realToday.getDate().toString().padStart(2, '0')}`;

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="calendar-day opacity-0 pointer-events-none"></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                const dayTasks = projects.filter(p => p.date === dateStr);
                const isToday = dateStr === realDateStr;

                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day cursor-pointer flex flex-col ${isToday ? 'today-glow' : ''}`;
                dayEl.onclick = () => openDetail(dateStr);
                dayEl.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] md:text-[12px] font-black ${isToday ? 'text-white' : 'text-slate-400'}">${d}</span>
                        ${dayTasks.length > 0 ? `<div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-indigo-500 shadow-[0_0_8px_#6366f1]"></div>` : ''}
                    </div>
                    <div class="flex-grow space-y-0.5 md:space-y-1">
                        ${dayTasks.slice(0, 2).map(p => `<span class="project-tag ${p.status}">${p.title}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(dayEl);
            }
        }

        function renderSidebars() {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${(today.getMonth() + 1).toString().padStart(2, '0')}-${today.getDate().toString().padStart(2, '0')}`;
            
            // Hari Ini
            const todayTasks = projects.filter(p => p.date === todayStr);
            const todayContainer = document.getElementById('today-tasks');
            if (todayTasks.length === 0) {
                todayContainer.innerHTML = `<p class="text-[9px] text-slate-500 font-bold uppercase text-center py-4 tracking-widest">Antrean Kosong</p>`;
            } else {
                todayContainer.innerHTML = todayTasks.map(p => `
                    <div class="bg-slate-800/60 p-3 rounded-xl border border-white/5 flex items-center gap-3 cursor-pointer" onclick="openDetail('${p.date}')">
                        <div class="w-1.5 h-6 rounded-full ${getStatusColor(p.status)}"></div>
                        <p class="text-[10px] font-black text-white truncate uppercase">${p.title}</p>
                    </div>
                `).join('');
            }

            // Mendatang (Sorting berdasarkan tanggal terdekat setelah hari ini)
            const upcomingContainer = document.getElementById('upcoming-tasks');
            const upcomingTasks = projects.filter(p => p.date > todayStr).sort((a,b) => a.date.localeCompare(b.date));

            if (upcomingTasks.length === 0) {
                upcomingContainer.innerHTML = `<p class="text-[9px] text-slate-500 font-bold uppercase text-center py-4 tracking-widest">Belum ada rencana</p>`;
            } else {
                upcomingContainer.innerHTML = upcomingTasks.slice(0, 10).map(p => {
                    const d = new Date(p.date);
                    const formattedDate = d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' }).toUpperCase();
                    return `
                        <div class="bg-slate-800/40 p-3 rounded-xl border border-white/5 flex flex-col gap-1 cursor-pointer hover:bg-slate-800/80 transition-all" onclick="openDetail('${p.date}')">
                            <div class="flex justify-between items-center">
                                <span class="text-[8px] font-black text-indigo-400 tracking-tighter">${formattedDate}</span>
                                <div class="w-1 h-1 rounded-full ${getStatusColor(p.status)}"></div>
                            </div>
                            <p class="text-[10px] font-black text-slate-200 truncate uppercase tracking-tight">${p.title}</p>
                        </div>
                    `;
                }).join('');
            }
        }

        function getStatusColor(s) {
            if(s === 'wait') return 'bg-amber-400';
            if(s === 'proses') return 'bg-blue-400';
            if(s === 'selesai') return 'bg-emerald-400';
            return 'bg-purple-500';
        }

        function openDetail(date) {
            const list = document.getElementById('detail-list');
            const dayTasks = projects.filter(p => p.date === date);
            document.getElementById('detail-date').innerText = new Date(date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
            
            list.innerHTML = dayTasks.length === 0 ? 
                `<p class="text-center py-10 text-slate-500 font-black uppercase text-xs tracking-widest">Tidak ada aktivitas</p>` :
                dayTasks.map(p => `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-white/10 flex items-center justify-between gap-4">
                        <div class="min-w-0">
                            <p class="text-[8px] font-black text-indigo-400 uppercase tracking-widest">${p.cat}</p>
                            <h4 class="text-sm font-black text-white uppercase truncate">${p.title}</h4>
                        </div>
                        <div class="flex items-center gap-2">
                            <select onchange="updateStatus(${p.id}, this.value, '${date}')" class="bg-slate-900 text-[10px] font-black text-white p-2 rounded-lg outline-none border border-white/10">
                                <option value="wait" ${p.status==='wait'?'selected':''}>WAIT</option>
                                <option value="proses" ${p.status==='proses'?'selected':''}>PROSES</option>
                                <option value="selesai" ${p.status==='selesai'?'selected':''}>DONE</option>
                                <option value="publish" ${p.status==='publish'?'selected':''}>PUBLISH</option>
                            </select>
                            <button onclick="deleteProject(${p.id}, '${date}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white transition-all"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    </div>
                `).join('');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function updateStatus(id, status, date) {
            projects = projects.map(p => p.id === id ? {...p, status} : p);
            save();
            openDetail(date);
        }

        function deleteProject(id, date) {
            projects = projects.filter(p => p.id !== id);
            save();
            const remaining = projects.filter(p => p.date === date);
            if (remaining.length > 0) openDetail(date); else closeModal('detailModal');
        }

        function changeMonth(dir) {
            currentViewDate.setMonth(currentViewDate.getMonth() + dir);
            renderCalendar();
        }

        function openFormModal() { document.getElementById('formModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        document.getElementById('projectForm').onsubmit = (e) => {
            e.preventDefault();
            projects.push({
                id: Date.now(),
                title: document.getElementById('p-title').value,
                date: document.getElementById('p-date').value,
                cat: document.getElementById('p-cat').value,
                status: 'wait'
            });
            save();
            closeModal('formModal');
            e.target.reset();
        };

        function save() {
            localStorage.setItem('azmania_v95_db', JSON.stringify(projects));
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
