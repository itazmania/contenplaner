<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZMANIA CONTENT HUB - v9.8 Multi-Color Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-blue-500">AZMANIA CONTENT HUB</h1>
            <p class="text-xs text-gray-400">IT & Production Pipeline | HUMAS IT</p>
        </div>
        <button onclick="document.getElementById('formModal').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-bold text-sm transition">
            + BUAT PROYEK
        </button>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-2 gap-4 mb-8">
        <div class="glass p-4 rounded-2xl border border-gray-700 text-center">
            <p class="text-xs text-gray-400 uppercase">Aktif Pipeline</p>
            <h2 id="stat-active" class="text-2xl font-bold">0</h2>
        </div>
        <div class="glass p-4 rounded-2xl border border-gray-700 text-center">
            <p class="text-xs text-gray-400 uppercase">Status Server</p>
            <h2 id="status-cloud" class="text-sm font-bold text-green-500">TERHUBUNG CLOUD</h2>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <h3 class="font-bold mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-blue-500 rounded-full"></span> MASTER SCHEDULE
        </h3>
        
        <div id="pipeline-list" class="space-y-4">
            <p class="text-center text-gray-500 py-10">Sinkronisasi Cloud...</p>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 p-4">
        <div class="glass border border-gray-700 p-6 rounded-3xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Input Proyek Baru</h2>
            <form id="projectForm" class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400">Nama Proyek</label>
                    <input type="text" id="p-title" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Deadline</label>
                        <input type="date" id="p-date" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Kategori</label>
                        <select id="p-cat" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:outline-none text-white">
                            <option value="Video">Video</option>
                            <option value="Desain">Desain</option>
                            <option value="Sosmed">Sosmed</option>
                            <option value="IT Hub">IT Hub</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeModal('formModal')" class="flex-1 bg-gray-800 p-3 rounded-xl font-bold">Batal</button>
                    <button type="submit" id="btn-submit" class="flex-1 bg-blue-600 p-3 rounded-xl font-bold">Simpan Proyek</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzW10m2jnwQBLTD56ASdv19luj1pOx692R7Q4LOCrdMQk1zvOHReatkTW8xTVTW_0YE/exec';
        let projects = [];

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // FUNGSI SIMPAN KE CLOUD
        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Mengirim...";
            btn.disabled = true;

            const payload = {
                nama: document.getElementById('p-title').value,
                deadline: document.getElementById('p-date').value,
                kategori: document.getElementById('p-cat').value
            };

            try {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                closeModal('formModal');
                e.target.reset();
                init(); // Segarkan tampilan
            } catch (err) {
                alert("Gagal koneksi ke Google Sheets: " + err);
            } finally {
                btn.innerText = "Simpan Proyek";
                btn.disabled = false;
            }
        };

        // FUNGSI AMBIL DATA DARI CLOUD
        async function init() {
            try {
                const response = await fetch(scriptURL);
                const dataCloud = await response.json();
                
                projects = dataCloud;
                document.getElementById('stat-active').innerText = projects.length;
                render();
            } catch (error) {
                document.getElementById('pipeline-list').innerHTML = `<p class="text-center text-red-400">Gagal memuat data Cloud.</p>`;
            }
        }

        // FUNGSI RENDER TAMPILAN
        function render() {
            const list = document.getElementById('pipeline-list');
            list.innerHTML = "";

            if (projects.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-600 py-10 font-bold uppercase tracking-widest">Pipeline Kosong</p>`;
                return;
            }

            projects.forEach(item => {
                let statusColor = "bg-yellow-500/20 text-yellow-500 border-yellow-500/50";
                let statusLabel = (item.status || 'WAIT').toUpperCase();

                if (statusLabel === "DONE") statusColor = "bg-green-500/20 text-green-500 border-green-500/50";
                if (statusLabel === "PUBLISH") statusColor = "bg-blue-500/20 text-blue-500 border-blue-500/50";

                list.innerHTML += `
                    <div class="glass p-5 rounded-2xl border border-gray-700 flex justify-between items-center group hover:border-blue-500 transition-all">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-blue-400">${item.kategori}</span>
                            <h4 class="text-lg font-bold text-white">${item.nama}</h4>
                            <p class="text-xs text-gray-500 font-medium">Tenggat: ${item.deadline}</p>
                        </div>
                        <div class="px-3 py-1 rounded-full border text-[9px] font-black uppercase tracking-wider ${statusColor}">
                            ${statusLabel}
                        </div>
                    </div>
                `;
            });
        }

        // Jalankan sinkronisasi otomatis
        window.onload = init;
    </script>
</body>
</html>
