<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZMANIA CONTENT HUB - Cloud Sync v13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            color: #f1f5f9;
            padding-bottom: 20px;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            transition: all 0.3s ease;
        }

        .brand-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
        }

        .brand-hub {
            color: #fbce03;
            text-shadow: 0 0 15px rgba(251, 206, 3, 0.4);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        @media (min-width: 768px) {
            .calendar-grid { gap: 12px; }
        }

        .calendar-day {
            aspect-ratio: 1/1;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            cursor: pointer;
        }

        .calendar-day:hover {
            transform: scale(1.05);
            z-index: 10;
            border-color: white;
        }

        .has-wait { background: rgba(251, 191, 36, 0.25) !important; border: 1px solid rgba(251, 191, 36, 0.5) !important; }
        .has-proses { background: rgba(96, 165, 250, 0.25) !important; border: 1px solid rgba(96, 165, 250, 0.5) !important; }
        .has-selesai { background: rgba(52, 211, 153, 0.25) !important; border: 1px solid rgba(52, 211, 153, 0.5) !important; }
        .has-publish { background: rgba(192, 132, 252, 0.25) !important; border: 1px solid rgba(192, 132, 252, 0.5) !important; }

        .today-glow {
            outline: 2px solid #fbce03 !important;
            outline-offset: 2px;
            box-shadow: 0 0 20px rgba(251, 206, 3, 0.3);
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .wait { background: #fbbf24; }
        .proses { background: #60a5fa; }
        .selesai { background: #34d399; }
        .publish { background: #c084fc; }

        .btn-primary {
            background: var(--accent-gradient);
            color: #ffffff;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
        }

        .sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
            padding: 10px 20px;
            border-radius: 99px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.4);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(120px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        .sync-indicator.active { transform: translateY(0); }
        .sync-indicator.error { border-color: #ef4444; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .agenda-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px;
            transition: all 0.2s ease;
        }
        .agenda-card:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div id="syncIndicator" class="sync-indicator">
        <i id="syncIcon" class="fa-solid fa-cloud-arrow-up animate-bounce text-indigo-400"></i>
        <span id="syncText" class="text-slate-200 tracking-widest">Menyinkronkan...</span>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-10 gap-6">
            <div class="flex items-center gap-4 md:gap-5">
                <div class="p-3 md:p-4 bg-slate-800 rounded-2xl border border-white/10 shadow-xl">
                    <i class="fa-solid fa-cloud-bolt text-indigo-400 text-xl md:text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-3xl font-black brand-text uppercase tracking-tight leading-none">
                        AZMANIA CONTENT <span class="brand-hub">HUB</span>
                    </h1>
                    <p class="text-indigo-300 text-[8px] md:text-[10px] font-bold tracking-[0.4em] mt-1 uppercase opacity-90">Google Sheet Integrated</p>
                </div>
            </div>

            <div class="glass-panel w-full md:w-auto px-4 md:px-6 py-3 md:py-4 flex flex-row items-center justify-between md:justify-start gap-4 md:gap-8 border-indigo-500/20">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-left md:text-right">
                        <div id="clock-time" class="text-lg md:text-2xl font-black text-white tracking-widest font-mono">00:00:00</div>
                        <div id="clock-date" class="text-[8px] md:text-[10px] font-bold text-slate-300 uppercase tracking-widest">LOADING...</div>
                    </div>
                </div>
                <div class="h-8 md:h-10 w-px bg-white/10"></div>
                <button onclick="openFormModal()" class="btn-primary px-4 md:px-7 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-[9px] md:text-[10px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-transform">
                    <i class="fa-solid fa-plus-circle text-sm"></i> <span class="hidden sm:inline">TAMBAH</span> PROYEK
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <aside class="lg:col-span-3 space-y-6 md:space-y-8 order-2 lg:order-1">
                <div class="glass-panel p-6 md:p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-3">Total Pipeline</p>
                    <div class="flex items-baseline gap-4">
                        <span id="active-count" class="text-5xl md:text-6xl font-black text-white tracking-tighter">0</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Konten</span>
                    </div>
                    <div class="mt-6">
                        <div class="flex justify-between items-center text-[9px] font-black text-slate-200 mb-2 uppercase">
                            <span>Efisiensi Cloud</span>
                            <span id="avg-text" class="text-indigo-400">0%</span>
                        </div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-white/5">
                            <div id="avg-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="glass-panel p-5 border-l-4 border-l-red-500">
                        <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                            <i class="fa-solid fa-fire text-red-500"></i> Deadline Hari Ini
                        </h3>
                        <div id="today-tasks" class="space-y-3 max-h-[150px] overflow-y-auto custom-scroll pr-1"></div>
                    </div>

                    <div class="glass-panel p-5 border-l-4 border-l-indigo-500">
                        <h3 class="text-[10px] font-black text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                            <i class="fa-solid fa-calendar-check text-indigo-400"></i> Agenda Mendatang
                        </h3>
                        <div id="upcoming-tasks" class="space-y-3 max-h-[300px] overflow-y-auto custom-scroll pr-1"></div>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-9 space-y-6 md:space-y-8 order-1 lg:order-2">
                <div class="glass-panel p-4 md:p-8 flex flex-col">
                    <div class="flex items-center justify-between mb-6 md:mb-10">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-slate-800 hover:bg-slate-700 text-white flex items-center justify-center transition-all"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                        <div class="text-center">
                            <h2 id="month-year" class="text-lg md:text-2xl font-black text-white tracking-tight uppercase"></h2>
                            <p class="text-[8px] md:text-[10px] text-indigo-400 font-black uppercase tracking-[0.3em] mt-1">SINKRONISASI AKTIF</p>
                        </div>
                        <button onclick="changeMonth(1)" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-slate-800 hover:bg-slate-700 text-white flex items-center justify-center transition-all"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                    </div>

                    <div class="calendar-grid">
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Min</div>
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Sen</div>
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Sel</div>
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Rab</div>
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Kam</div>
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Jum</div>
                        <div class="text-center py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Sab</div>
                        <div id="calendar-days" class="contents"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="formModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-lg p-8">
            <h3 class="text-2xl font-black mb-1 text-white uppercase tracking-tighter">Entri Pipeline</h3>
            <form id="projectForm" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Nama Proyek</label>
                    <input type="text" id="p-title" required class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Deadline</label>
                        <input type="date" id="p-date" required class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Kategori</label>
                        <select id="p-cat" class="w-full px-5 py-3.5 bg-slate-900 border border-white/10 rounded-xl text-sm outline-none focus:border-indigo-500 text-white font-bold">
                            <option value="Video">Video</option>
                            <option value="Desain">Desain</option>
                            <option value="Sosmed">Sosmed</option>
                            <option value="IT Hub">IT Hub</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('formModal')" class="flex-grow py-4 bg-slate-800 text-slate-300 rounded-xl font-black text-[10px] uppercase tracking-widest">Batal</button>
                    <button type="submit" class="flex-grow py-4 btn-primary text-white rounded-xl font-black text-[10px] uppercase tracking-widest">Simpan ke Cloud</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900">
                <h3 id="detail-date-title" class="text-xl md:text-2xl font-black text-white uppercase tracking-tighter"></h3>
                <button onclick="closeModal('detailModal')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-red-500 transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto custom-scroll" id="detail-list"></div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzW10m2jnwQBLTD56ASdv19luj1pOx692R7Q4LOCrdMQk1zvOHReatkTW8xTVTW_0YE/exec";
        
        let projects = JSON.parse(localStorage.getItem('azmania_v10_db')) || [];
        let currentViewDate = new Date();
        const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];

        async function fetchFromCloud() {
            if (!APPS_SCRIPT_URL) return;
            
            showSync(true, "Sinkronisasi Cloud...");
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=read&t=${Date.now()}`);
                
                if (!response.ok) throw new Error("Gagal terhubung ke Cloud");
                
                const data = await response.json();
                if (data && Array.isArray(data)) {
                    projects = data;
                    localStorage.setItem('azmania_v10_db', JSON.stringify(projects));
                    renderAll();
                    showSync(false, "Sinergi Cloud Berhasil");
                }
            } catch (err) {
                console.warn("Gagal menjangkau cloud, menggunakan data lokal:", err);
                showSync(false, projects.length > 0 ? "Bekerja Secara Offline" : "Koneksi Cloud Gagal", true);
            }
        }

        async function syncToSheet(data, action = "add") {
            if (!APPS_SCRIPT_URL) return;

            showSync(true, "Mengirim ke Cloud...");
            try {
                const payload = { action: action, ...data };
                await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                showSync(false, "Terpahat di Cloud");
                setTimeout(fetchFromCloud, 3000);
            } catch (err) {
                console.error("Sinkronisasi Gagal:", err);
                showSync(false, "Gagal Mengirim", true);
            }
        }

        function init() {
            updateClock();
            renderAll();
            fetchFromCloud();
            setInterval(fetchFromCloud, 300000);
        }

        function renderAll() {
            renderStats();
            renderCalendar();
            renderSidebars();
        }

        function showSync(status, message, isError = false) {
            const indicator = document.getElementById('syncIndicator');
            const text = document.getElementById('syncText');
            const icon = document.getElementById('syncIcon');
            
            text.innerText = message;
            indicator.classList.toggle('error', isError);

            if (status) {
                indicator.classList.add('active');
                icon.className = "fa-solid fa-cloud-arrow-up animate-bounce text-indigo-400";
            } else {
                icon.className = isError ? "fa-solid fa-triangle-exclamation text-red-400" : "fa-solid fa-circle-check text-emerald-400";
                setTimeout(() => indicator.classList.remove('active'), 3000);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('clock-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        }
        setInterval(updateClock, 1000);

        function renderStats() {
            document.getElementById('active-count').innerText = projects.length;
            if (projects.length === 0) {
                document.getElementById('avg-bar').style.width = '0%';
                document.getElementById('avg-text').innerText = '0%';
                return;
            }
            const weights = { 'wait': 10, 'proses': 50, 'selesai': 90, 'publish': 100 };
            const avg = Math.round(projects.reduce((acc, p) => acc + (weights[p.status] || 0), 0) / projects.length);
            document.getElementById('avg-bar').style.width = avg + '%';
            document.getElementById('avg-text').innerText = avg + '%';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            grid.innerHTML = '';
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('month-year').innerText = `${months[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const realToday = new Date().toISOString().split('T')[0];

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                const dayTasks = projects.filter(p => p.date === dateStr);
                
                let statusClass = '';
                if (dayTasks.some(p => p.status === 'wait')) statusClass = 'has-wait';
                else if (dayTasks.some(p => p.status === 'proses')) statusClass = 'has-proses';
                else if (dayTasks.some(p => p.status === 'selesai')) statusClass = 'has-selesai';
                else if (dayTasks.some(p => p.status === 'publish')) statusClass = 'has-publish';

                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day ${dateStr === realToday ? 'today-glow' : ''} ${statusClass}`;
                dayEl.onclick = () => openDetail(dateStr);
                dayEl.innerHTML = `<span class="text-sm font-black">${d}</span>`;
                grid.appendChild(dayEl);
            }
        }

        function renderSidebars() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            // Deadline Hari Ini
            const todayTasks = projects.filter(p => p.date === todayStr);
            const todayContainer = document.getElementById('today-tasks');
            todayContainer.innerHTML = todayTasks.length === 0 ? `<p class="text-[9px] text-center text-slate-500 py-4 italic uppercase">Kosong</p>` :
                todayTasks.map(p => `<div class="bg-slate-800/60 p-3 rounded-xl flex items-center gap-3"><div class="status-dot ${p.status}"></div><p class="text-[10px] font-black truncate">${p.title}</p></div>`).join('');

            // Agenda Mendatang (Next 7 Days)
            const next7Days = new Date();
            next7Days.setDate(now.getDate() + 7);
            const next7DaysStr = next7Days.toISOString().split('T')[0];

            const upcomingTasks = projects
                .filter(p => p.date > todayStr && p.date <= next7DaysStr)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const upcomingContainer = document.getElementById('upcoming-tasks');
            
            if (upcomingTasks.length === 0) {
                upcomingContainer.innerHTML = `<p class="text-[9px] text-center text-slate-500 py-4 italic uppercase">Tidak ada agenda dekat</p>`;
            } else {
                upcomingContainer.innerHTML = upcomingTasks.map(p => {
                    const taskDate = new Date(p.date);
                    const formattedDate = taskDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                    return `
                        <div class="agenda-card cursor-pointer" onclick="openDetail('${p.date}')">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[8px] font-black text-indigo-400 uppercase tracking-tighter">${formattedDate}</span>
                                <div class="status-dot ${p.status}"></div>
                            </div>
                            <p class="text-[10px] font-bold text-white leading-tight truncate">${p.title}</p>
                            <p class="text-[8px] text-slate-400 mt-1 uppercase font-black">${p.cat || 'Konten'}</p>
                        </div>
                    `;
                }).join('');
            }
        }

        function openDetail(date) {
            const list = document.getElementById('detail-list');
            const dayTasks = projects.filter(p => p.date === date);
            document.getElementById('detail-date-title').innerText = date;
            list.innerHTML = dayTasks.map(p => `
                <div class="bg-slate-800 p-4 rounded-2xl flex items-center justify-between mb-4 border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="status-dot ${p.status} w-2 h-2"></div>
                        <h4 class="text-sm font-black text-white">${p.title}</h4>
                    </div>
                    <div class="flex items-center gap-3">
                        <select onchange="updateStatus(${p.id}, this.value, '${date}')" class="bg-slate-900 text-[10px] font-black p-2 rounded-lg border border-white/10 text-white outline-none">
                            <option value="wait" ${p.status==='wait'?'selected':''}>WAIT</option>
                            <option value="proses" ${p.status==='proses'?'selected':''}>PROSES</option>
                            <option value="selesai" ${p.status==='selesai'?'selected':''}>DONE</option>
                            <option value="publish" ${p.status==='publish'?'selected':''}>PUBLISH</option>
                        </select>
                        <button onclick="deleteProject(${p.id}, '${date}')" class="text-red-500 hover:text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('') || '<div class="py-10 text-center text-slate-500 italic uppercase text-[10px]">Belum Ada Agenda</div>';
            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function updateStatus(id, status, date) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            projects = projects.map(p => p.id === id ? {...p, status} : p);
            saveLocal();
            openDetail(date);
            await syncToSheet({...project, status}, "update");
        }

        async function deleteProject(id, date) {
            const project = projects.find(p => p.id === id);
            projects = projects.filter(p => p.id !== id);
            saveLocal();
            openDetail(date);
            await syncToSheet(project, "delete");
        }

        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            const newProject = {
                id: Date.now(),
                title: document.getElementById('p-title').value,
                date: document.getElementById('p-date').value,
                cat: document.getElementById('p-cat').value,
                status: 'wait'
            };
            projects.push(newProject);
            saveLocal();
            closeModal('formModal');
            e.target.reset();
            await syncToSheet(newProject, "add");
        };

        function saveLocal() {
            localStorage.setItem('azmania_v10_db', JSON.stringify(projects));
            renderAll();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openFormModal() { document.getElementById('formModal').classList.remove('hidden'); }
        function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderCalendar(); }

        window.onload = init;
    </script>
</body>
</html>
